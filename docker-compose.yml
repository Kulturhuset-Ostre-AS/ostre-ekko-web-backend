services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www:delegated
    working_dir: /var/www/cms
    networks: [app]

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - .:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks: [app]

  # Optional local database — omit profile on the VM when using Cloud SQL.
  db:
    profiles: [local-db]
    image: mariadb:10.6
    environment:
      MARIADB_DATABASE: craft
      MARIADB_USER: craft
      MARIADB_PASSWORD: craft
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "${MYSQL_PORT:-33060}:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks: [app]

networks:
  app:
    driver: bridge

volumes:
  db_data:
