# Automated deploy of Craft to the GCP VM, end-to-end.
#
# What it does:
#   1. WIF auth as the deploy service account
#   2. terraform apply (optional — infra + VM startup metadata refresh)
#   3. Package repo, stream it to the VM via IAP SSH
#   4. Run scripts/vm/write-cms-env.sh on the VM (pulls DB password from Secret Manager)
#   5. Bring Compose up with docker-compose.gcp.yml (Cloud SQL Auth Proxy sidecar)
#
# Required GitHub settings (same as terraform-gcp.yml):
#   Variables: GCP_PROJECT_ID
#   Secrets:   GCP_WIF_PROVIDER, GCP_WIF_SERVICE_ACCOUNT, TF_STATE_BUCKET
#
# The WIF service account also needs, at minimum:
#   - roles/compute.osLogin  (or compute.instanceAdmin.v1 for ad-hoc SSH)
#   - roles/iap.tunnelResourceAccessor
#   - roles/iam.serviceAccountUser on the VM service account (ekko-app@…)
#   plus whatever Terraform / Cloud SQL Admin / Storage roles it already has for apply.

name: deploy-craft

on:
  workflow_dispatch:
    inputs:
      terraform_apply_first:
        description: "Run terraform apply before deploying (when infra or VM metadata changed)"
        type: choice
        default: "no"
        options:
          - "no"
          - "yes"
      primary_url:
        description: "Public Craft URL (trailing slash). Leave blank to derive from terraform output craft_vm_url_hint."
        required: false
        type: string
        default: ""
      restart_vm_before_deploy:
        description: "Stop/start the VM first (runs startup script again, picks up new /etc/ekko-craft.env)"
        type: choice
        default: "no"
        options:
          - "no"
          - "yes"

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform init (GCS backend)
        working-directory: terraform
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/ekko"

      - name: Terraform apply (optional)
        if: github.event.inputs.terraform_apply_first == 'yes'
        working-directory: terraform
        run: terraform apply -input=false -no-color -auto-approve

      - name: Read Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          set -euo pipefail
          clean() { v="${1:-}"; [ "$v" = "null" ] && v=""; printf '%s' "$v"; }
          VM=$(clean "$(terraform output -raw craft_vm_name 2>/dev/null || true)")
          ZONE=$(clean "$(terraform output -raw craft_vm_zone 2>/dev/null || true)")
          PROJECT=$(clean "$(terraform output -raw project_id 2>/dev/null || true)")
          URL_HINT=$(clean "$(terraform output -raw craft_vm_url_hint 2>/dev/null || true)")
          if [ -z "$VM" ] || [ -z "$ZONE" ] || [ -z "$PROJECT" ]; then
            echo "Terraform is missing VM outputs. Enable vm_enabled and run terraform apply first." >&2
            exit 1
          fi
          echo "vm=$VM"       >>"$GITHUB_OUTPUT"
          echo "zone=$ZONE"   >>"$GITHUB_OUTPUT"
          echo "project=$PROJECT" >>"$GITHUB_OUTPUT"
          echo "url_hint=$URL_HINT" >>"$GITHUB_OUTPUT"

      - name: Pick SITE_URL
        id: url
        run: |
          set -euo pipefail
          PICK='${{ github.event.inputs.primary_url }}'
          if [ -z "$PICK" ]; then PICK='${{ steps.tf.outputs.url_hint }}'; fi
          if [ -z "$PICK" ]; then
            echo "No primary_url provided and craft_vm_url_hint is null (vm_enable_http_firewall=false?); set the primary_url input." >&2
            exit 1
          fi
          echo "primary_url=$PICK" >>"$GITHUB_OUTPUT"

      - name: Optional restart VM
        if: github.event.inputs.restart_vm_before_deploy == 'yes'
        run: |
          set -euo pipefail
          gcloud compute instances stop  "${{ steps.tf.outputs.vm }}" --zone="${{ steps.tf.outputs.zone }}" --project="${{ steps.tf.outputs.project }}" --quiet
          gcloud compute instances start "${{ steps.tf.outputs.vm }}" --zone="${{ steps.tf.outputs.zone }}" --project="${{ steps.tf.outputs.project }}" --quiet

      - name: Wait for VM startup to finish (/etc/ekko-craft.env ready)
        run: |
          set -euo pipefail
          for i in $(seq 1 40); do
            if gcloud compute ssh "${{ steps.tf.outputs.vm }}" \
                --zone="${{ steps.tf.outputs.zone }}" \
                --project="${{ steps.tf.outputs.project }}" \
                --tunnel-through-iap \
                --command="sudo test -f /etc/ekko-craft.env"; then
              echo "VM ready."
              exit 0
            fi
            echo "Waiting for first-boot script… ($i)"
            sleep 15
          done
          echo "Timed out waiting for /etc/ekko-craft.env" >&2
          exit 1

      - name: Sync repo to /srv/ekko/app
        run: |
          set -euo pipefail
          tar \
            --exclude='./.git' \
            --exclude='./.terraform' \
            --exclude='./cms/vendor' \
            --exclude='./cms/.env' \
            --exclude='./cms/storage' \
            --exclude='./node_modules' \
            --exclude='./.cursor' \
            -czf - . | \
          gcloud compute ssh "${{ steps.tf.outputs.vm }}" \
            --zone="${{ steps.tf.outputs.zone }}" \
            --project="${{ steps.tf.outputs.project }}" \
            --tunnel-through-iap \
            --command="sudo mkdir -p /srv/ekko/app && sudo tar -xzf - -C /srv/ekko/app --strip-components=0 && \
              sudo chmod -R a+rX /srv/ekko/app/public_html /srv/ekko/app/docker /srv/ekko/app/cms && \
              if sudo test -f /srv/ekko/app/cms/.env; then \
                sudo chown root:www-data /srv/ekko/app/cms/.env 2>/dev/null || sudo chown root:33 /srv/ekko/app/cms/.env; \
                sudo chmod 640 /srv/ekko/app/cms/.env; \
              fi"

      - name: Write cms/.env + .env.gcp on VM
        run: |
          set -euo pipefail
          gcloud compute ssh "${{ steps.tf.outputs.vm }}" \
            --zone="${{ steps.tf.outputs.zone }}" \
            --project="${{ steps.tf.outputs.project }}" \
            --tunnel-through-iap \
            --command="sudo bash /srv/ekko/app/scripts/vm/write-cms-env.sh --primary-url $(printf '%q' '${{ steps.url.outputs.primary_url }}')"

      - name: Disable stale host Cloud SQL Auth Proxy (if any)
        run: |
          gcloud compute ssh "${{ steps.tf.outputs.vm }}" \
            --zone="${{ steps.tf.outputs.zone }}" \
            --project="${{ steps.tf.outputs.project }}" \
            --tunnel-through-iap \
            --command="if systemctl list-unit-files cloud-sql-proxy.service --no-legend --no-pager | grep -q cloud-sql-proxy; then sudo systemctl disable --now cloud-sql-proxy; fi" || true

      - name: Compose up (Cloud SQL proxy + PHP + nginx)
        run: |
          set -euo pipefail
          gcloud compute ssh "${{ steps.tf.outputs.vm }}" \
            --zone="${{ steps.tf.outputs.zone }}" \
            --project="${{ steps.tf.outputs.project }}" \
            --tunnel-through-iap \
            --command="cd /srv/ekko/app && sudo docker compose -f docker-compose.yml -f docker-compose.gcp.yml --env-file .env.gcp run --rm php composer install --no-interaction --no-progress"
          gcloud compute ssh "${{ steps.tf.outputs.vm }}" \
            --zone="${{ steps.tf.outputs.zone }}" \
            --project="${{ steps.tf.outputs.project }}" \
            --tunnel-through-iap \
            --command="cd /srv/ekko/app && sudo docker compose -f docker-compose.yml -f docker-compose.gcp.yml --env-file .env.gcp up -d --build"

      - name: Smoke test (HTTP)
        run: |
          set -euo pipefail
          URL='${{ steps.url.outputs.primary_url }}'
          for i in $(seq 1 20); do
            CODE=$(curl -sS -o /tmp/body -w '%{http_code}' --max-time 15 "$URL" || echo 000)
            echo "try $i: HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              head -c 500 /tmp/body
              exit 0
            fi
            sleep 5
          done
          echo "---- body ----"; head -c 2000 /tmp/body || true
          echo "---- cloudsql logs ----"
          gcloud compute ssh "${{ steps.tf.outputs.vm }}" \
            --zone="${{ steps.tf.outputs.zone }}" \
            --project="${{ steps.tf.outputs.project }}" \
            --tunnel-through-iap \
            --command="cd /srv/ekko/app && sudo docker compose -f docker-compose.yml -f docker-compose.gcp.yml --env-file .env.gcp logs --tail=50 cloudsql php nginx" || true
          exit 1
