# Automated Craft-on-GCP deploy. Build two immutable images in CI, push to
# Artifact Registry, then tell the VM to `docker compose pull && up -d`.
#
# No compilation, no composer install, no source sync happens on the VM.
#
# Required GitHub settings (bootstrapped by scripts/bootstrap-github-deploy.sh):
#   Variables: GCP_PROJECT_ID
#   Secrets:   GCP_WIF_PROVIDER, GCP_WIF_SERVICE_ACCOUNT, TF_STATE_BUCKET
#
# The bootstrapped service account has roles/owner on the project, so it can
# push to Artifact Registry. The VM service account (ekko-app@…) has
# roles/artifactregistry.reader so it can pull.

name: deploy-craft

on:
  workflow_dispatch:
    inputs:
      terraform_apply_first:
        description: "Run terraform apply before deploying (first run / infra changes)"
        type: choice
        default: "no"
        options: ["no", "yes"]
      primary_url:
        description: "Public Craft URL (trailing slash). Leave blank to use craft_vm_url_hint."
        required: false
        type: string
        default: ""
      restart_vm_before_deploy:
        description: "Stop/start the VM first (picks up new /etc/ekko-craft.env)"
        type: choice
        default: "no"
        options: ["no", "yes"]

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/ekko"

      - name: Terraform apply (optional)
        if: github.event.inputs.terraform_apply_first == 'yes'
        working-directory: terraform
        run: terraform apply -input=false -no-color -auto-approve

      - name: Read Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          set -euo pipefail
          clean() { v="${1:-}"; [ "$v" = "null" ] && v=""; printf '%s' "$v"; }
          VM=$(clean "$(terraform output -raw craft_vm_name 2>/dev/null || true)")
          ZONE=$(clean "$(terraform output -raw craft_vm_zone 2>/dev/null || true)")
          PROJECT=$(clean "$(terraform output -raw project_id 2>/dev/null || true)")
          REGION=$(clean "$(terraform output -raw region 2>/dev/null || true)")
          REPO=$(clean "$(terraform output -raw artifact_registry_repo 2>/dev/null || true)")
          HOST=$(clean "$(terraform output -raw artifact_registry_host 2>/dev/null || true)")
          URL_HINT=$(clean "$(terraform output -raw craft_vm_url_hint 2>/dev/null || true)")
          if [ -z "$VM" ] || [ -z "$ZONE" ] || [ -z "$PROJECT" ] || [ -z "$REPO" ] || [ -z "$HOST" ]; then
            echo "Missing outputs (VM / Artifact Registry). Run with terraform_apply_first=yes." >&2
            exit 1
          fi
          echo "vm=$VM"             >>"$GITHUB_OUTPUT"
          echo "zone=$ZONE"         >>"$GITHUB_OUTPUT"
          echo "project=$PROJECT"   >>"$GITHUB_OUTPUT"
          echo "region=$REGION"     >>"$GITHUB_OUTPUT"
          echo "repo=$REPO"         >>"$GITHUB_OUTPUT"
          echo "host=$HOST"         >>"$GITHUB_OUTPUT"
          echo "url_hint=$URL_HINT" >>"$GITHUB_OUTPUT"

      - name: Resolve image tags
        id: img
        run: |
          set -euo pipefail
          SHA_TAG="${GITHUB_SHA::12}"
          echo "php_sha=${{ steps.tf.outputs.repo }}/php:${SHA_TAG}"     >>"$GITHUB_OUTPUT"
          echo "php_latest=${{ steps.tf.outputs.repo }}/php:latest"      >>"$GITHUB_OUTPUT"
          echo "nginx_sha=${{ steps.tf.outputs.repo }}/nginx:${SHA_TAG}" >>"$GITHUB_OUTPUT"
          echo "nginx_latest=${{ steps.tf.outputs.repo }}/nginx:latest"  >>"$GITHUB_OUTPUT"

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker "${{ steps.tf.outputs.host }}" --quiet

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push PHP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.php_sha }}
            ${{ steps.img.outputs.php_latest }}
          cache-from: type=registry,ref=${{ steps.img.outputs.php_latest }}
          cache-to: type=inline
          provenance: false

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.nginx_sha }}
            ${{ steps.img.outputs.nginx_latest }}
          cache-from: type=registry,ref=${{ steps.img.outputs.nginx_latest }}
          cache-to: type=inline
          provenance: false

      - name: Pick SITE_URL
        id: url
        run: |
          set -euo pipefail
          PICK='${{ github.event.inputs.primary_url }}'
          if [ -z "$PICK" ]; then PICK='${{ steps.tf.outputs.url_hint }}'; fi
          if [ -z "$PICK" ]; then
            echo "No primary_url and craft_vm_url_hint is null." >&2
            exit 1
          fi
          echo "primary_url=$PICK" >>"$GITHUB_OUTPUT"

      - name: Optional restart VM
        if: github.event.inputs.restart_vm_before_deploy == 'yes'
        run: |
          set -euo pipefail
          gcloud compute instances stop  "${{ steps.tf.outputs.vm }}" --zone="${{ steps.tf.outputs.zone }}" --project="${{ steps.tf.outputs.project }}" --quiet
          gcloud compute instances start "${{ steps.tf.outputs.vm }}" --zone="${{ steps.tf.outputs.zone }}" --project="${{ steps.tf.outputs.project }}" --quiet

      - name: Wait for VM startup to finish (/etc/ekko-craft.env ready)
        run: |
          set -euo pipefail
          for i in $(seq 1 40); do
            if gcloud compute ssh "${{ steps.tf.outputs.vm }}" \
                --zone="${{ steps.tf.outputs.zone }}" \
                --project="${{ steps.tf.outputs.project }}" \
                --tunnel-through-iap \
                --command="sudo test -f /etc/ekko-craft.env"; then
              echo "VM ready."
              exit 0
            fi
            echo "Waiting for first-boot… ($i)"
            sleep 15
          done
          echo "Timed out waiting for /etc/ekko-craft.env" >&2
          exit 1

      - name: Ship compose + env-writer to the VM
        env:
          VM:      ${{ steps.tf.outputs.vm }}
          ZONE:    ${{ steps.tf.outputs.zone }}
          PROJECT: ${{ steps.tf.outputs.project }}
        run: |
          set -euo pipefail
          gcloud compute ssh "$VM" --zone="$ZONE" --project="$PROJECT" --tunnel-through-iap \
            --command="sudo mkdir -p /srv/ekko && sudo chown \$(id -u):\$(id -g) /srv/ekko"
          gcloud compute scp \
            --zone="$ZONE" --project="$PROJECT" --tunnel-through-iap \
            docker-compose.yml docker-compose.gcp.yml \
            "$VM:/srv/ekko/"
          gcloud compute scp \
            --zone="$ZONE" --project="$PROJECT" --tunnel-through-iap \
            scripts/vm/write-cms-env.sh \
            "$VM:/tmp/write-cms-env.sh"
          gcloud compute ssh "$VM" --zone="$ZONE" --project="$PROJECT" --tunnel-through-iap \
            --command="sudo chown root:root /srv/ekko/docker-compose.yml /srv/ekko/docker-compose.gcp.yml /tmp/write-cms-env.sh && sudo chmod 644 /srv/ekko/docker-compose.yml /srv/ekko/docker-compose.gcp.yml && sudo chmod 755 /tmp/write-cms-env.sh"

      - name: Write cms.env + .env.gcp on VM
        run: |
          set -euo pipefail
          gcloud compute ssh "${{ steps.tf.outputs.vm }}" \
            --zone="${{ steps.tf.outputs.zone }}" \
            --project="${{ steps.tf.outputs.project }}" \
            --tunnel-through-iap \
            --command="sudo /tmp/write-cms-env.sh \
              --primary-url $(printf %q '${{ steps.url.outputs.primary_url }}') \
              --php-image    $(printf %q '${{ steps.img.outputs.php_sha }}') \
              --nginx-image  $(printf %q '${{ steps.img.outputs.nginx_sha }}')"

      - name: Disable legacy services on VM (older deploys)
        run: |
          gcloud compute ssh "${{ steps.tf.outputs.vm }}" \
            --zone="${{ steps.tf.outputs.zone }}" \
            --project="${{ steps.tf.outputs.project }}" \
            --tunnel-through-iap \
            --command="if systemctl list-unit-files cloud-sql-proxy.service --no-legend --no-pager | grep -q cloud-sql-proxy; then sudo systemctl disable --now cloud-sql-proxy; fi; \
              if [ -d /srv/ekko/app ]; then sudo docker compose -f /srv/ekko/app/docker-compose.yml -f /srv/ekko/app/docker-compose.gcp.yml --env-file /srv/ekko/app/.env.gcp down --remove-orphans 2>/dev/null || true; fi" || true

      - name: Pull + up (Compose)
        env:
          AR_HOST: ${{ steps.tf.outputs.host }}
        run: |
          set -euo pipefail
          # Docker-login to Artifact Registry using the VM's own SA token from
          # the metadata server (no gcloud CLI needed on the VM).
          REMOTE='set -e
            TOKEN=$(curl -sS -H "Metadata-Flavor: Google" \
              http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token \
              | python3 -c "import sys,json; print(json.load(sys.stdin)[\"access_token\"])")
            printf "%s" "$TOKEN" | sudo docker login -u oauth2accesstoken --password-stdin '"$AR_HOST"'
            cd /srv/ekko
            sudo docker compose -f docker-compose.yml -f docker-compose.gcp.yml --env-file .env.gcp pull
            sudo docker compose -f docker-compose.yml -f docker-compose.gcp.yml --env-file .env.gcp up -d --remove-orphans'
          gcloud compute ssh "${{ steps.tf.outputs.vm }}" \
            --zone="${{ steps.tf.outputs.zone }}" \
            --project="${{ steps.tf.outputs.project }}" \
            --tunnel-through-iap \
            --command="$REMOTE"

      - name: Smoke test
        run: |
          set -euo pipefail
          URL='${{ steps.url.outputs.primary_url }}'
          for i in $(seq 1 20); do
            CODE=$(curl -sS -o /tmp/body -w '%{http_code}' --max-time 15 "$URL" || echo 000)
            echo "try $i: HTTP $CODE"
            if [ "$CODE" = "200" ]; then head -c 500 /tmp/body; exit 0; fi
            sleep 5
          done
          echo "---- body ----"; head -c 2000 /tmp/body || true
          echo "---- container logs ----"
          gcloud compute ssh "${{ steps.tf.outputs.vm }}" \
            --zone="${{ steps.tf.outputs.zone }}" \
            --project="${{ steps.tf.outputs.project }}" \
            --tunnel-through-iap \
            --command="cd /srv/ekko && sudo docker compose -f docker-compose.yml -f docker-compose.gcp.yml --env-file .env.gcp logs --tail=80 cloudsql php nginx" || true
          exit 1
