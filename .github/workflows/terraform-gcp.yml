# Run Terraform in GitHub Actions (no Terraform on your laptop).
# Prerequisites:
# 1) A GCS bucket for Terraform state (create once in the GCP project).
# 2) Workload Identity Federation: GitHub -> GCP (recommended) OR a key (not recommended).
# 3) GitHub repository variables / secrets as referenced below.
#
# https://github.com/google-github-actions/auth#setting-up-workload-identity-federation

name: terraform-gcp

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: true
  # Repo variable: Settings -> Secrets and variables -> Actions -> Variables
  TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
  # Optional: add variable GCP_REGION and uncomment to override Terraform default region.
  # TF_VAR_region: ${{ vars.GCP_REGION }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform init (GCS backend)
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/ekko"

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -input=false -no-color

      - name: Terraform apply
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
        run: terraform apply -input=false -no-color -auto-approve
