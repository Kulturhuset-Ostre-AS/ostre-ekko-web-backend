# GCP / production VM overlay. Usage on the VM:
#   docker compose -f docker-compose.yml -f docker-compose.gcp.yml --env-file .env.gcp pull
#   docker compose -f docker-compose.yml -f docker-compose.gcp.yml --env-file .env.gcp up -d
#
# `.env.gcp` is written by scripts/vm/write-cms-env.sh. It defines:
#   EKKO_PHP_IMAGE=<artifact registry path>/php:<tag>
#   EKKO_NGINX_IMAGE=<artifact registry path>/nginx:<tag>
#   EKKO_CLOUDSQL_CONNECTION=<project:region:instance>
#   HTTP_PORT=8080

services:
  cloudsql:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.2
    restart: unless-stopped
    networks: [app]
    command:
      - "--structured-logs"
      - "--address=0.0.0.0"
      - "--port=3306"
      - "${EKKO_CLOUDSQL_CONNECTION}"

  php:
    image: ${EKKO_PHP_IMAGE}
    build: !reset null
    restart: unless-stopped
    depends_on:
      cloudsql:
        condition: service_started
    environment:
      CRAFT_DOTENV_PATH: /var/www/cms/.env
    # !override replaces the dev bind-mount (.:/var/www:delegated) from the
    # base file so the baked image's /var/www isn't shadowed.
    volumes: !override
      - /srv/ekko/cms.env:/var/www/cms/.env:ro
      - cpresources:/var/www/public_html/cpresources
      - craft_storage:/var/www/cms/storage

  nginx:
    image: ${EKKO_NGINX_IMAGE}
    restart: unless-stopped
    volumes: !override
      - cpresources:/var/www/public_html/cpresources:ro

volumes:
  cpresources:
  craft_storage:
